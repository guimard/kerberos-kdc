#
# krb5.conf for the LemonLDAP::NG portal running the krb-provisioning plugin.
#
# The plugin sets the realm and admin_server in-process (via
# Authen::Krb5::Admin::Config), but libkadm5's init_with_skey still has to
# obtain initial credentials for the service principal from the *KDC* (AS
# exchange, port 88) before it can talk to kadmind (port 749). That KDC
# location is only discoverable through this file (or DNS). Hence both lines.
#
# Hostnames are the docker-compose network aliases of the `kdc` service.

[libdefaults]
    default_realm = EXAMPLE.COM
    dns_lookup_kdc = false
    dns_lookup_realm = false
    # The provisioner principal's keytab uses the enctypes ktadd picked; leave
    # the KDC's default set, do not restrict here.

[realms]
    EXAMPLE.COM = {
        kdc = kdc.example.com:88
        admin_server = kdc.example.com:749
    }

[domain_realm]
    .example.com = EXAMPLE.COM
    example.com = EXAMPLE.COM
