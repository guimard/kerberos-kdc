#
# Full pure-kdc stack: dedicated Kerberos OpenLDAP + MIT KDC.
#
# Prototype values are inlined for clarity (matching DNs/passwords between the
# two services). For real use, move secrets to a .env / Docker secrets, and put
# TLS in front of LDAP (ldaps://) instead of the plain ldap:// used here.
#
# First `up` provisions the realm in LDAP (KRB5_CREATE_REALM=true). It is
# idempotent on subsequent starts (the realm/master stash persist in volumes).

services:
  ldap:
    build: ./ldap
    image: pure-kdc-ldap:latest
    hostname: ldap
    environment:
      LDAP_DOMAIN: example.com
      LDAP_ORGANISATION: Example
      LDAP_ADMIN_PASSWORD: adminpw
      LDAP_KDC_DN: cn=kdc-service,ou=services,dc=example,dc=com
      LDAP_KDC_PASSWORD: kdcpw
      LDAP_KADMIN_DN: cn=kadmin-service,ou=services,dc=example,dc=com
      LDAP_KADMIN_PASSWORD: kadminpw
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
    healthcheck:
      # slapd answers on the network once first-boot init has finished.
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "", "-s", "base", "-LLL", "1.1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  kdc:
    build: .
    image: pure-kdc:latest
    hostname: kdc.example.com
    depends_on:
      ldap:
        condition: service_healthy
    environment:
      KRB5_REALM: EXAMPLE.COM
      KRB5_KDC_HOSTNAME: kdc.example.com
      KRB5_DOMAIN: example.com
      # Plain ldap:// for the prototype (same Docker network).
      LDAP_SERVERS: ldap://ldap
      LDAP_KERBEROS_CONTAINER_DN: cn=krbContainer,dc=example,dc=com
      LDAP_KDC_DN: cn=kdc-service,ou=services,dc=example,dc=com
      LDAP_KDC_PASSWORD: kdcpw
      LDAP_KADMIN_DN: cn=kadmin-service,ou=services,dc=example,dc=com
      LDAP_KADMIN_PASSWORD: kadminpw
      KRB5_MASTER_PASSWORD: masterpw
      # First-boot realm provisioning (idempotent afterwards).
      KRB5_CREATE_REALM: "true"
      LDAP_ADMIN_DN: cn=admin,dc=example,dc=com
      LDAP_ADMIN_PASSWORD: adminpw
      # Service principal + keytab for the LemonLDAP::NG provisioning plugin.
      # MUST equal the plugin's krbServicePrincipal. Named 'lemonldap/provision'
      # (not */admin) for clarity + defence in depth; the kadm5.acl is rendered
      # restricted-line-first so any name only gets 'acmi'. Keytab on a shared
      # volume.
      KRB5_PROVISIONER_PRINCIPAL: lemonldap/provision@EXAMPLE.COM
      KRB5_PROVISIONER_KEYTAB: /keytabs/llng-provision.keytab
    volumes:
      - kdc-state:/etc/krb5kdc
      - provisioner-keytab:/keytabs
    networks:
      default:
        # So the portal can reach the KDC under the FQDN used in its krb5.conf
        # ([realms] kdc = kdc.example.com:88) — `hostname:` is not a resolvable
        # alias on the compose network, a network alias is.
        aliases:
          - kdc.example.com
    # Expose to clients on a real deployment (privileged ports → need host root):
    # ports:
    #   - "88:88/tcp"
    #   - "88:88/udp"
    #   - "464:464/tcp"
    #   - "464:464/udp"
    #   - "749:749/tcp"

  # ----------------------------------------------------------------------
  # LemonLDAP::NG portal carrying the krb-provisioning plugin.
  #
  # Default Demo auth backend (accounts dwho/dwho, rtyler/rtyler, …): a
  # password-based login, so the cleartext password reaches the plugin's
  # betweenAuthAndData hook, which (re)sets the matching Kerberos key on the
  # KDC via kadmind. End result: after one portal login as `dwho`, `kinit dwho`
  # against this stack's KDC succeeds with the same password.
  #
  # The plugin authenticates to kadmind (749) with the provisioner keytab the
  # KDC generated (shared, read-only). examples/llng-cont-init.sh copies it to
  # a www-data-private 0600 file and enables/configures the plugin at boot;
  # examples/llng-krb5.conf gives libkadm5 the KDC location for the AS exchange.
  # See tests/krb-provisioning-e2e.sh for the automated end-to-end check.
  # ----------------------------------------------------------------------
  llng:
    image: yadd/lemonldap-ng-full:latest
    hostname: auth.example.com
    depends_on:
      kdc:
        # soft: the keytab must merely exist; the plugin no-ops until it does.
        condition: service_started
    environment:
      SSODOMAIN: example.com
      PORTAL: http://auth.example.com/
      LOGLEVEL: notice
      # ---- consumed by examples/llng-cont-init.sh, NOT by LLNG itself ----
      # The script feeds these to `updateConf set` (plugin config) and to the
      # keytab copy. KRB_SERVICE_PRINCIPAL MUST equal the KDC's
      # KRB5_PROVISIONER_PRINCIPAL; KRB_ADMIN_SERVER host must match krb5.conf.
      KRB_REALM: EXAMPLE.COM
      KRB_ADMIN_SERVER: kdc.example.com:749
      KRB_SERVICE_PRINCIPAL: lemonldap/provision@EXAMPLE.COM
      KRB_CONNECT_TIMEOUT: "5"
    volumes:
      - provisioner-keytab:/keytabs:ro
      - ./examples/llng-krb5.conf:/etc/krb5.conf:ro
      - ./examples/llng-cont-init.sh:/etc/cont-init.d/zz-krb-provisioning:ro
    ports:
      - "8088:80"   # portal on http://localhost:8088/ (Host: auth.example.com)

volumes:
  ldap-data:
  ldap-config:
  kdc-state:
  provisioner-keytab:
