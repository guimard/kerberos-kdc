#
# Full pure-kdc stack: dedicated Kerberos OpenLDAP + MIT KDC.
#
# Prototype values are inlined for clarity (matching DNs/passwords between the
# two services). For real use, move secrets to a .env / Docker secrets, and put
# TLS in front of LDAP (ldaps://) instead of the plain ldap:// used here.
#
# First `up` provisions the realm in LDAP (KRB5_CREATE_REALM=true). It is
# idempotent on subsequent starts (the realm/master stash persist in volumes).

services:
  ldap:
    build: ./ldap
    image: pure-kdc-ldap:latest
    hostname: ldap
    environment:
      LDAP_DOMAIN: example.com
      LDAP_ORGANISATION: Example
      LDAP_ADMIN_PASSWORD: adminpw
      LDAP_KDC_DN: cn=kdc-service,ou=services,dc=example,dc=com
      LDAP_KDC_PASSWORD: kdcpw
      LDAP_KADMIN_DN: cn=kadmin-service,ou=services,dc=example,dc=com
      LDAP_KADMIN_PASSWORD: kadminpw
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
    healthcheck:
      # slapd answers on the network once first-boot init has finished.
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "", "-s", "base", "-LLL", "1.1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  kdc:
    build: .
    image: pure-kdc:latest
    hostname: kdc.example.com
    depends_on:
      ldap:
        condition: service_healthy
    environment:
      KRB5_REALM: EXAMPLE.COM
      KRB5_KDC_HOSTNAME: kdc.example.com
      KRB5_DOMAIN: example.com
      # Plain ldap:// for the prototype (same Docker network).
      LDAP_SERVERS: ldap://ldap
      LDAP_KERBEROS_CONTAINER_DN: cn=krbContainer,dc=example,dc=com
      LDAP_KDC_DN: cn=kdc-service,ou=services,dc=example,dc=com
      LDAP_KDC_PASSWORD: kdcpw
      LDAP_KADMIN_DN: cn=kadmin-service,ou=services,dc=example,dc=com
      LDAP_KADMIN_PASSWORD: kadminpw
      KRB5_MASTER_PASSWORD: masterpw
      # First-boot realm provisioning (idempotent afterwards).
      KRB5_CREATE_REALM: "true"
      LDAP_ADMIN_DN: cn=admin,dc=example,dc=com
      LDAP_ADMIN_PASSWORD: adminpw
      # Service principal + keytab for the LemonLDAP::NG provisioning plugin.
      # Named 'lemonldap/provision' (NOT */admin) so it gets the restricted
      # 'acmi' ACL line, not the wildcard. Keytab lands on a shared volume.
      KRB5_PROVISIONER_PRINCIPAL: lemonldap/provision@EXAMPLE.COM
      KRB5_PROVISIONER_KEYTAB: /keytabs/llng-provision.keytab
    volumes:
      - kdc-state:/etc/krb5kdc
      - provisioner-keytab:/keytabs
    # Expose to clients on a real deployment (privileged ports → need host root):
    # ports:
    #   - "88:88/tcp"
    #   - "88:88/udp"
    #   - "464:464/tcp"
    #   - "464:464/udp"
    #   - "749:749/tcp"

  # ----------------------------------------------------------------------
  # LemonLDAP::NG with the krb-provisioning plugin (sketch — adapt to your
  # LLNG image). The plugin authenticates to kadmind (port 749) with the
  # keytab generated by the KDC, mounted read-only here.
  # ----------------------------------------------------------------------
  # llng:
  #   image: your-lemonldap-ng:with-krb-provisioning-plugin
  #   depends_on:
  #     kdc:
  #       condition: service_started
  #   volumes:
  #     - provisioner-keytab:/etc/lemonldap-ng/keytabs:ro
  #     # a krb5.conf with the realm + admin_server = kdc.example.com:749
  #     - ./examples/llng-krb5.conf:/etc/krb5.conf:ro
  #   environment:
  #     # The plugin needs `kadmin` (krb5-user) and/or Authen::Krb5::Admin
  #     # installed in this image. LLNG plugin config parameters:
  #     #   krbProvisioningActivation = 1
  #     #   krbRealm                  = EXAMPLE.COM
  #     #   krbAdminServer            = kdc.example.com:749
  #     #   krbServicePrincipal       = lemonldap/provision@EXAMPLE.COM
  #     #   krbKeytab                 = /etc/lemonldap-ng/keytabs/llng-provision.keytab
  #     # (set them via your LLNG configuration backend / manager)
  #     PLACEHOLDER: "see docs/llng-kerberos-provisioning-plugin.md"

volumes:
  ldap-data:
  ldap-config:
  kdc-state:
  provisioner-keytab:
